<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set List — Backstage Bites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{overflow-x:hidden}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0b0a08;color:#ede8df;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

    .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px 16px 12px;display:flex;align-items:center;justify-content:space-between;background:#0b0a08}
    .nav-logo{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ede8df}
    .nav-logo a{display:flex;align-items:center;gap:10px;color:#ede8df;text-decoration:none}
    .nav-logo img{width:28px;height:28px;border-radius:50%;object-fit:cover}

    .hamburger{width:32px;height:24px;position:relative;background:none;border:none;cursor:pointer;z-index:210;padding:0;display:flex;flex-direction:column;justify-content:space-between}
    .hamburger span{display:block;width:100%;height:2.5px;background:#ede8df;border-radius:2px;transition:transform .3s,opacity .3s}
    .hamburger.open span:nth-child(1){transform:translateY(10.5px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-10.5px) rotate(-45deg)}

    .side-menu-overlay{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .3s}
    .side-menu-overlay.open{opacity:1;pointer-events:auto}
    .side-menu{position:fixed;top:0;right:0;width:280px;height:100vh;height:100dvh;z-index:200;background:#141210;padding:80px 32px 32px;transform:translateX(100%);transition:transform .35s cubic-bezier(.22,.68,.4,1);display:flex;flex-direction:column}
    .side-menu.open{transform:translateX(0)}
    .side-menu ul{list-style:none;display:flex;flex-direction:column;gap:4px}
    .side-menu li a{display:block;padding:14px 16px;font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#ede8df;text-decoration:none;border-radius:6px;transition:background .2s}
    .side-menu li a:active{background:rgba(237,232,223,.08)}
    .side-menu-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:none;border:none;color:rgba(237,232,223,.5);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s,color .2s}
    .side-menu-close:active{background:rgba(237,232,223,.08);color:#ede8df}

    .menu-wrap{padding-top:64px}
    .menu-wrap img{display:block;width:100%;height:auto}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">
      <a href="index.html">
        <img src="webvids/resturanticon.png" alt="Backstage Bites" />
        Backstage Bites
      </a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <div class="side-menu-overlay" id="sideMenuOverlay"></div>
  <div class="side-menu" id="sideMenu">
    <button class="side-menu-close" id="sideMenuClose">&times;</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="index.html#order-now">Order</a></li>
      <li><a href="index.html#join-list">Join the List</a></li>
    </ul>
  </div>

  <div class="menu-wrap">
    <img src="icon/setlist%20menue.png" alt="Set List Menu" />
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const sideMenu = document.getElementById('sideMenu');
    const sideMenuOverlay = document.getElementById('sideMenuOverlay');
    const sideMenuClose = document.getElementById('sideMenuClose');

    function toggleMenu(open) {
      hamburger.classList.toggle('open', open);
      sideMenu.classList.toggle('open', open);
      sideMenuOverlay.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }

    hamburger.addEventListener('click', () => toggleMenu(true));
    sideMenuOverlay.addEventListener('click', () => toggleMenu(false));
    sideMenuClose.addEventListener('click', () => toggleMenu(false));
    sideMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', (e) => {
        const href = a.getAttribute('href');
        toggleMenu(false);
        if (href && href !== '#') {
          e.preventDefault();
          window.location.href = href;
        }
      });
    });
  </script>
</body>
</html>
